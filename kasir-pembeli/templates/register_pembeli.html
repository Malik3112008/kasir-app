<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Akun</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='global-fix.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='login_pembeli_rakha.css') }}">
</head>
<body>

    <a href="{{ url_for('pembeli_login') }}" class="back">← Kembali</a>

    <div class="container">

        <img src="{{ url_for('static', filename='newlogo.jpeg') }}" class="logo">

        <div class="box">

            <h1>Daftar Akun Baru</h1>

            {% if error %}
            <p class="error-message">{{ error }}</p>
            {% endif %}

            <form action="{{ url_for('pembeli_register') }}" method="POST">

                <label>Nama Pengguna</label>
                <input type="text" name="username" placeholder="Masukkan Nama Pengguna" required>

                <label>Kata Sandi</label>
                <div class="password-field">
                    <input type="password" name="password" placeholder="Buat Kata Sandi" required>
                    <span class="eye-icon" onclick="togglePassword(this)">👁</span>
                </div>

                <label>Konfirmasi Kata Sandi</label>
                <div class="password-field">
                    <input type="password" name="confirm" placeholder="Konfirmasi Kata Sandi" required>
                    <span class="eye-icon" onclick="togglePassword(this)">👁</span>
                </div>

                <button type="submit">Daftar Sekarang</button>

            </form>

            <p class="login-link">
                Sudah punya akun?
                <a href="{{ url_for('pembeli_login') }}">Masuk di sini</a>
            </p>

        </div>

    </div>

    <script>
    function togglePassword(el) {
        var input = el.parentElement.querySelector('input');
        if (input.type === 'password') {
            input.type = 'text';
            el.textContent = '🙈';
        } else {
            input.type = 'password';
            el.textContent = '👁';
        }
    }
    </script>
</body>
</html>
