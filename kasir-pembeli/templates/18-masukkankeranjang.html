<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="{{ url_for('static', filename='18-reyhandiky.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='global-fix.css') }}">

<title>Keranjang Belanja</title>

<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #dff7ff; }

    .kembali {
        text-decoration: none;
        color: black;
        font-size: 18px;
        font-weight: bold;
        display: inline-flex;
        align-items: center;
        min-height: 44px;
        padding: 8px 16px;
        margin-bottom: 20px;
    }
    .kembali:hover { color: #6fa8ff; }

    .container {
        max-width: 700px;
        width: 100%;
        margin: 30px auto;
        background: white;
        padding: 24px;
        border-radius: 16px;
        border: 3px solid #6fa8ff;
    }

    h1 { font-size: 24px; margin-bottom: 24px; }

    .item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 16px;
        padding-bottom: 16px;
        border-bottom: 1px solid #eee;
        min-height: 80px;
    }
    .item:last-of-type { border-bottom: none; }

    .item img {
        width: 80px;
        height: 80px;
        object-fit: cover;
        border-radius: 8px;
    }

    .nama { flex: 1; min-width: 0; }
    .nama h2 { font-size: 16px; margin-bottom: 4px; }
    .nama p { font-size: 14px; color: #666; }

    .control {
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .control button, .hapus {
        width: 44px;
        height: 44px;
        border: none;
        background: #78a7ff;
        color: white;
        font-size: 18px;
        border-radius: 8px;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
    }
    .control button:hover, .hapus:hover { background: #5a8fe0; }
    .hapus { background: #e74c3c; font-size: 20px; }
    .hapus:hover { background: #c0392b; }

    .total {
        font-size: 24px;
        font-weight: bold;
        margin-top: 24px;
        padding-top: 16px;
        border-top: 2px solid #6fa8ff;
    }

    .checkout {
        width: 100%;
        min-height: 48px;
        margin-top: 16px;
        padding: 14px;
        border: none;
        border-radius: 12px;
        background: #78a7ff;
        color: white;
        font-size: 18px;
        cursor: pointer;
        font-weight: bold;
        display: block;
        text-align: center;
        text-decoration: none;
        line-height: 1.4;
    }
    .checkout:hover { background: #5a8fe0; }

    @media (max-width: 600px) {
        .container { padding: 16px; margin: 16px; }
        .item { flex-wrap: wrap; gap: 12px; }
        .item img { width: 60px; height: 60px; }
        h1 { font-size: 20px; }
        .total { font-size: 20px; }
    }
</style>
</head>

<body>

<div style="padding: 16px;">
    <a href="/pembeli" class="kembali">← Kembali</a>
</div>

<div class="container">

    <h1>Keranjang Belanja</h1>

    <div class="item" id="roti">
        <img src="{{ url_for('static', filename='gambar dan icon/roti.jpg') }}" alt="Roti Aoka">
        <div class="nama">
            <h2>Roti Aoka</h2>
            <p>4000 x 1</p>
        </div>
        <div class="control">
            <button onclick="kurang('roti')">-</button>
            <span id="jumlah-roti">1</span>
            <button onclick="tambah('roti')">+</button>
        </div>
        <button class="hapus" onclick="hapusItem(this)">&#128465;</button>
    </div>

    <div class="item" id="air">
        <img src="{{ url_for('static', filename='gambar dan icon/ades.jpg') }}" alt="Air Mineral">
        <div class="nama">
            <h2>Air Mineral</h2>
            <p>3000 x 1</p>
        </div>
        <div class="control">
            <button onclick="kurang('air')">-</button>
            <span id="jumlah-air">1</span>
            <button onclick="tambah('air')">+</button>
        </div>
        <button class="hapus" onclick="hapusItem(this)">&#128465;</button>
    </div>

    <div class="item" id="bolpoin">
        <img src="{{ url_for('static', filename='gambar dan icon/bilpoin.jpg') }}" alt="Bolpoin">
        <div class="nama">
            <h2>Bolpoin</h2>
            <p>4000 x 1</p>
        </div>
        <div class="control">
            <button onclick="kurang('bolpoin')">-</button>
            <span id="jumlah-bolpoin">1</span>
            <button onclick="tambah('bolpoin')">+</button>
        </div>
        <button class="hapus" onclick="hapusItem(this)">&#128465;</button>
    </div>

    <div class="total" id="total">
        Total: Rp 11.000
    </div>

    <a href="/pembeli/pilih-pembayaran" class="checkout">
        Lanjutkan ke Pembayaran
    </a>

</div>

<script>
let cart = {
    roti: { harga: 4000, jumlah: 1 },
    air: { harga: 3000, jumlah: 1 },
    bolpoin: { harga: 4000, jumlah: 1 }
};

function updateTotal() {
    let total = 0;
    for (let item in cart) {
        total += cart[item].harga * cart[item].jumlah;
    }
    document.getElementById("total").innerHTML = "Total: Rp " + total.toLocaleString("id-ID");
}

function tambah(item) {
    cart[item].jumlah++;
    document.getElementById("jumlah-" + item).innerHTML = cart[item].jumlah;
    updateTotal();
}

function kurang(item) {
    if (cart[item].jumlah > 1) {
        cart[item].jumlah--;
        document.getElementById("jumlah-" + item).innerHTML = cart[item].jumlah;
    } else {
        delete cart[item];
        document.getElementById(item).remove();
    }
    updateTotal();
}

function hapusItem(button) {
    let itemDiv = button.parentElement;
    let itemId = itemDiv.id;
    delete cart[itemId];
    itemDiv.remove();
    updateTotal();
}

updateTotal();
</script>

</body>
</html>
