<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='05.login_admin.css') }}">
    <title>Login Pembeli</title>
</head>
<body class="login-page">
    <a href="/admin" class="back-btn">← kembali</a>
    <div class="card">
        <div style="background:#4CAF50; width:60px; height:60px; border-radius:50%; margin: 0 auto 16px; display:flex; align-items:center; justify-content:center;">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
        </div>
        <h3>Masuk Pembeli</h3>
        <p style="font-size: 14px; color: #666; margin-bottom: 20px;">Masuk untuk berbelanja di Koperasi Siswa</p>
        {% if error %}
        <div class="error-message">{{ error }}</div>
        {% endif %}
        <form action="{{ url_for('pembeli_login') }}" method="POST">
            <div class="input-group">
                <label>Nama akun</label>
                <input type="text" name="username" placeholder="Masukkan nama akun" required>
            </div>
            <div class="input-group">
                <label>Kata sandi</label>
                <input type="password" name="password" placeholder="Masukkan kata sandi" required>
            </div>
            <button type="submit" class="btn-primary" style="background-color: #4CAF50;">Masuk</button>
        </form>
        <p class="footer-text">Belum punya akun? Hubungi admin koperasi</p>
    </div>
</body>
</html>
