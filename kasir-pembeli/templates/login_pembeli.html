<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Koperasi</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='global-fix.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='login_pembeli_rakha.css') }}">
</head>
<body>

    <a href="/admin" class="back">← Kembali</a>

    <div class="container">

        <h2>Selamat Datang di Koperasi Siswa</h2>

        <div class="login-box">

            <div class="logo-bos">
                <img src="{{ url_for('static', filename='newlogo.jpeg') }}" alt="Logo" class="logo">
            </div>

            <h1>USER LOGIN</h1>

            {% if error %}
            <p class="error-message">{{ error }}</p>
            {% endif %}

            <form action="{{ url_for('pembeli_login') }}" method="POST">

                <label>Nama Pengguna</label>
                <input type="text" name="username" placeholder="Nama Pengguna" required>

                <label>Kata Sandi</label>
                <div class="password-field">
                    <input type="password" name="password" placeholder="Kata Sandi" required>
                    <span class="eye-icon" onclick="togglePassword(this)">👁</span>
                </div>

                <div class="forgot">
                    <a href="/pembeli/reset-password">Lupa Sandi?</a>
                </div>

                <button type="submit">MASUK</button>

            </form>

            <p class="register">
                Belum punya akun?
                <a href="{{ url_for('pembeli_register') }}">Daftar di sini</a>
            </p>

        </div>

    </div>

    <script>
    function togglePassword(el) {
        var input = el.parentElement.querySelector('input');
        if (input.type === 'password') {
            input.type = 'text';
            el.textContent = '🙈';
        } else {
            input.type = 'password';
            el.textContent = '👁';
        }
    }
    </script>
</body>
</html>
