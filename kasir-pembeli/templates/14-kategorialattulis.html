</div>

</div>

<script>
    function tambah(button) {
        let jumlah = button.parentElement.querySelector("span");
        jumlah.innerText = parseInt(jumlah.innerText) + 1;
    }

    function kurang(button) {
        let jumlah = button.parentElement.querySelector("span");
        let angka = parseInt(jumlah.innerText);

        if (angka > 0) {
            jumlah.innerText = angka - 1;
        }
    }

    const search = document.getElementById("search");

search.addEventListener("keyup", function () {

    let keyword = search.value.toLowerCase();

    let cards = document.querySelectorAll(".card");

    cards.forEach(function(card){

        let namaProduk = card.querySelector("h3").innerText.toLowerCase();

        if(namaProduk.includes(keyword)){
            card.style.display = "block";
        } else {
            card.style.display = "none";
        }

    });

});

function pindahHalaman(select){
    window.location.href = select.value;
}
    
</script>

</body>
