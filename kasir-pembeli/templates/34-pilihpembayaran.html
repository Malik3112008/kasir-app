<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pilih Pembayaran</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='global-fix.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='34-yunirohmawati.css') }}">
</head>
<body>

<a href="/pembeli/keranjang" class="kembali">← Kembali</a>

<div class="container">

    <div class="card">
        <div class="judul">Pesanan Anda</div>
        {% for item in items %}
        <div class="produk">
            <div>
                <h3>{{ item.nama }}</h3>
                <p>Rp {{ "{:,.0f}".format(item.harga).replace(",", ".") }} x {{ item.qty }}</p>
            </div>
        </div>
        {% endfor %}
    </div>

    <div class="card">
        <div class="judul">Metode Pembayaran</div>

        <form id="paymentForm">

            <div class="metode-group">
                <button type="button" class="metode-btn" data-value="tunai" onclick="pilihMetode(this)">
                    💵 Tunai
                </button>
                <button type="button" class="metode-btn" data-value="qris" onclick="pilihMetode(this)">
                    📱 QRIS
                </button>
            </div>

            <input type="hidden" name="metode" id="metodeInput" value="">

            <div class="total">
                Total : {{ total }}
            </div>

            <button type="submit" class="btn-next">
                Selanjutnya
            </button>

        </form>

    </div>

</div>

<script>
function pilihMetode(btn) {
    document.querySelectorAll('.metode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('metodeInput').value = btn.dataset.value;
}

document.getElementById("paymentForm").addEventListener("submit", function(e) {
    e.preventDefault();
    let metode = document.getElementById('metodeInput').value;
    if (!metode) {
        alert("Pilih metode pembayaran dulu!");
        return;
    }
    if (metode === "tunai") {
        window.location.href = "/pembeli/tunai";
    } else if (metode === "qris") {
        window.location.href = "/pembeli/qris";
    }
});
</script>

</body>
</html>
