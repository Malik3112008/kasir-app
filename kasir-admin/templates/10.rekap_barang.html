<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Rekap Barang</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='global-fix.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='10.pengisian_barang_habis.css') }}">
</head>
<body>
    <nav>
            <div class="nav-bar">
                <li>
                    <a href="/admin/pengisian_barang"><img src="{{ url_for('static', filename='back-svgrepo-com.svg') }}" alt="Kembali" width="30px" height="30px"></a>
                </li>
                <img src="{{ url_for('static', filename='newlogo.jpeg') }}" alt="Logo" width="70" height="70">
                <span>Admin Koperasi</span>
            </div>
            <ul>
                <li>
                    <a href="/admin/notifikasi"><img src="{{ url_for('static', filename='bell-notification-ui-svgrepo.svg') }}" alt="Notifikasi" width="30px" height="30px"></a>
                </li>
                <li>
                    <a href="/admin/pengaturan"><img src="{{ url_for('static', filename='setting-svgrepo.svg') }}" alt="Setting" width="30px" height="30px"></a>
                </li>
                <li>
                    <a href="/admin/kelola_akun_penjual"><img src="{{ url_for('static', filename='profile-circle-svgrepo.svg') }}" alt="Pengguna" width="30px" height="30px"></a>
                </li>
                <li>
                    <a href="/admin/logout"><img src="{{ url_for('static', filename='logout-line-svgrepo.svg') }}" alt="Keluar" width="30px" height="30px"></a>
                </li>
            </ul>
        </nav>

<div class="container">

    <div class="card">

        <a href="/admin/pengisian_barang">← Kembali</a>

        <h2>REKAP BARANG HABIS</h2>

        <label>Kategori</label>
        <input type="text" value="{{ kategori }}" readonly>

        <label>Nama Barang</label>
        <input type="text" value="{{ nama_barang }}" readonly>

        <label>Tanggal</label>
        <input type="text" value="{{ tanggal }}" readonly>

        <label>Jumlah</label>
        <input type="text" value="{{ jumlah }}" readonly>

        <label>Harga</label>
        <input type="text" value="{{ harga }}" readonly>

        <label>Catatan</label>
        <textarea readonly>{{ catatan }}</textarea>

    </div>

</div>

</body>
</html>
