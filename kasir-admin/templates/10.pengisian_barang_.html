<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pengisian Barang</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='global-fix.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='10.pengisian_barang_habis.css') }}">
</head>
<body>

    <nav>
        <div class="nav-bar">
            <li>
                <a href="{{ url_for('admin_dashboard') }}"><img src="{{ url_for('static', filename='back-svgrepo-com.svg') }}" alt="Kembali" width="30px" height="30px"></a>
            </li>
            <img src="{{ url_for('static', filename='newlogo.jpeg') }}" alt="Logo" width="70" height="70">
            <span>Admin Koperasi</span>
        </div>
        <ul>
            <li><a href="{{ url_for('admin_notifikasi') }}"><img src="{{ url_for('static', filename='bell-notification-ui-svgrepo.svg') }}" alt="Notifikasi" width="30px" height="30px"></a></li>
            <li><a href="{{ url_for('admin_pengaturan') }}"><img src="{{ url_for('static', filename='setting-svgrepo.svg') }}" alt="Setting" width="30px" height="30px"></a></li>
            <li><a href="{{ url_for('admin_kelola_akun_penjual') }}"><img src="{{ url_for('static', filename='profile-circle-svgrepo.svg') }}" alt="Pengguna" width="30px" height="30px"></a></li>
            <li><a href="{{ url_for('admin_logout') }}"><img src="{{ url_for('static', filename='logout-line-svgrepo.svg') }}" alt="Keluar" width="30px" height="30px"></a></li>
        </ul>
    </nav>

    <!-- FORM -->
    <div class="container">

        <div class="card">

        <h2>TAMBAH DATA BARANG</h2>

        <form action="{{ url_for('admin_simpan') }}" method="POST" enctype="multipart/form-data">
            {% if barang %}
            <input type="hidden" name="restok_id" value="{{ barang.no }}">
            {% endif %}

            <label>Pilih Kategori</label>
            <select name="kategori" required>
                <option value="">Pilih Kategori</option>
                <option value="Makanan" {% if barang and barang.kategori == 'Makanan' %}selected{% endif %}>Makanan</option>
                <option value="Minuman" {% if barang and barang.kategori == 'Minuman' %}selected{% endif %}>Minuman</option>
                <option value="Alat Tulis" {% if barang and barang.kategori == 'Alat Tulis' %}selected{% endif %}>Alat Tulis</option>
            </select>

            <label>Nama Barang</label>
            <input type="text" name="nama_barang" placeholder="Masukkan nama barang" value="{{ barang.nama if barang else '' }}" required>

            <label>Detail Produk</label>
            <div class="detail-box">
                <div class="detail-item">
                    <span>Variasi :</span>
                    <input type="text" name="variasi" placeholder="Contoh: Le Mineral">
                </div>
                <div class="detail-item">
                    <span>Volume :</span>
                    <input type="text" name="volume" placeholder="Contoh: 600 ml">
                </div>
                <div class="detail-item">
                    <span>Rasa :</span>
                    <input type="text" name="rasa" placeholder="Contoh: Original">
                </div>
                <div class="detail-item">
                    <span>Expired :</span>
                    <input type="text" name="expired" placeholder="Contoh: April-2028">
                </div>
            </div>

            <label>Deskripsi</label>
            <details class="deskripsi-box">
                <summary></summary>
                <textarea name="catatan" rows="6" placeholder="Tulis deskripsi barang..."></textarea>
            </details>

            <div class="row">
                <div class="col">
                    <label>Harga Beli</label>
                    <input type="number" name="harga_beli" min="1" step="1" placeholder="2500" required>
                </div>
                <div class="col">
                    <label>Harga Jual</label>
                    <input type="number" name="harga_jual" min="1" step="1" placeholder="3000" value="{{ barang.harga if barang else '' }}" required>
                </div>
            </div>

            <div class="row">
                <div class="col">
                    <label>Jumlah</label>
                    <input type="number" name="jumlah" min="1" step="1" placeholder="35" required>
                </div>
                <div class="col">
                    <label>Tanggal Penambahan</label>
                    <input type="date" name="tanggal" required>
                </div>
            </div>

            <label>Upload Foto</label>
            <input type="file" name="foto" accept=".jpg,.jpeg,.png" onchange="previewImage(event)">
            <img id="foto-preview" src="#" alt="Preview" style="display:none; max-width:200px; margin-top:10px; border-radius:8px;">

            <button type="submit" class="btn">
                SIMPAN
            </button>

        </form>

        </div>

    </div>

    <!-- SUCCESS MODAL -->
    <div id="successModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:9999; justify-content:center; align-items:center;">
        <div style="background:#fff; border-radius:12px; padding:30px 40px; text-align:center; max-width:400px; width:90%; box-shadow:0 4px 20px rgba(0,0,0,0.3);">
            <div style="font-size:48px; margin-bottom:10px;">&#10003;</div>
            <h2 style="margin:0 0 10px; font-size:18px; color:#333;">Berhasil!</h2>
            <p style="margin:0 0 20px; font-size:14px; color:#555;">Barang baru berhasil disimpan!</p>
            <button onclick="closeModal()" style="padding:10px 30px; background:#4CAF50; color:#fff; border:none; border-radius:8px; font-size:14px; cursor:pointer;">OK</button>
        </div>
    </div>

    <script>
        function previewImage(event) {
            var reader = new FileReader();
            reader.onload = function() {
                var output = document.getElementById('foto-preview');
                output.src = reader.result;
                output.style.display = 'block';
            };
            reader.readAsDataURL(event.target.files[0]);
        }

        function closeModal() {
            document.getElementById('successModal').style.display = 'none';
        }

        document.querySelector('form').addEventListener('submit', function(e) {
            e.preventDefault();
            var form = this;
            var formData = new FormData(form);

            fetch(form.action, {
                method: 'POST',
                body: formData
            }).then(function(response) {
                document.getElementById('successModal').style.display = 'flex';
                form.reset();
                document.getElementById('foto-preview').style.display = 'none';
            }).catch(function(error) {
                document.getElementById('successModal').style.display = 'flex';
                form.reset();
                document.getElementById('foto-preview').style.display = 'none';
            });
        });
    </script>

</body>
</html>
